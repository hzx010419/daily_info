<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no" />
<title>材料选题日报</title>
<meta property="og:title" content="材料选题日报" />
<meta property="og:description" content="每日写作线索，按日期归档" />
<meta name="description" content="每日写作线索，按日期归档" />
<link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <h1 id="site-title">材料选题日报</h1>
      <p id="site-subtitle">每日写作线索，按日期归档</p>
    </div>
  </header>

  <main class="container">
    <div class="toolbar">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 10-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1114 9.5 4.5 4.5 0 019.5 14z"/></svg>
        <input id="search" type="search" placeholder="搜索关键词…" autocomplete="off" />
      </div>
      <div class="sort-box">
        <select id="sort">
          <option value="desc">最新在前</option>
          <option value="asc">最早在前</option>
        </select>
      </div>
    </div>

    <div id="issue-list" class="issue-list">
      <div class="loading">正在加载…</div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="disclaimer" id="disclaimer"></div>
  </footer>

  <script src="assets/disclaimer.js"></script>
  <script src="assets/index.js"></script>
</body>
</html>
