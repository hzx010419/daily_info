<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- 渐变背景 -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1664ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a3fbf;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#13b5b1;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#1664ff;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg-gradient)" rx="0" ry="0"/>
  
  <!-- 装饰元素：圆形 -->
  <circle cx="1050" cy="120" r="80" fill="url(#accent-gradient)" opacity="0.3"/>
  <circle cx="150" cy="500" r="60" fill="#ffffff" opacity="0.1"/>
  <rect x="900" y="480" width="200" height="200" rx="100" fill="#ffffff" opacity="0.05" transform="rotate(45 1000 580)"/>
  
  <!-- 主标题 -->
  <text x="600" y="260" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="88" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="2">信息选题参考</text>
  
  <!-- 分隔线 -->
  <line x1="380" y1="300" x2="820" y2="300" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
  
  <!-- 副标题 -->
  <text x="600" y="360" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="36" font-weight="400" fill="#ffffff" text-anchor="middle" opacity="0.9">每日热点信息，按日期归档</text>
  
  <!-- 底部装饰 -->
  <text x="600" y="560" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="300" fill="#ffffff" text-anchor="middle" opacity="0.7">点击查看今日资讯</text>
</svg>