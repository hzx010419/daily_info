<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />

  <!-- 微信分享优化 -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="信息选题参考" />
  <meta property="og:title" content="信息选题参考 - 每日热点信息" />
  <meta property="og:description" content="每日热点信息，按日期归档。点击查看今日资讯。" />
  <meta property="og:image" content="https://dailyinfox.cn/assets/og-image.png" />
  <meta property="og:url" content="https://dailyinfox.cn" />

  <!-- Twitter Card（备用） -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="信息选题参考" />
  <meta name="twitter:description" content="每日热点信息，按日期归档" />
  <meta name="twitter:image" content="https://dailyinfox.cn/assets/og-image.png" />

  <title>信息选题参考</title>
  <meta name="description" content="每日热点信息，按日期归档" />
  <link rel="stylesheet" href="assets/style.css?v=20260701" />
</head>
<body>
  <header class="hero hero-compact">
    <div class="hero-inner">
      <h1 id="site-title">信息选题参考</h1>
      <p id="site-subtitle">每日热点信息，按日期归档</p>
    </div>
  </header>

  <!-- 栏目切换 tab（sticky，移动端可横向滚动） -->
  <nav class="tabbar" id="tabbar">
    <button class="tab active" data-tab="issues">往期日报</button>
    <button class="tab" data-tab="timelines">追踪线</button>
    <button class="tab" data-tab="clues">全部线索</button>
  </nav>

  <main class="container">
    <!-- 工具栏：搜索 + 排序/筛选 -->
    <div class="toolbar">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 10-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1114 9.5 4.5 4.5 0 019.5 14z"/></svg>
        <input id="search" type="search" placeholder="搜索关键词、标题、标签…" autocomplete="off" />
      </div>
      <div class="sort-box" id="sort-box">
        <select id="sort">
          <option value="desc">最新在前</option>
          <option value="asc">最早在前</option>
        </select>
      </div>
    </div>

    <!-- 分类标签筛选栏（全局搜索/追踪线时显示） -->
    <div id="cat-filter" class="cat-filter" hidden></div>

    <!-- 面板：往期日报 -->
    <section id="panel-issues" class="panel">
      <div id="issue-list" class="issue-list"><div class="loading">正在加载…</div></div>
    </section>

    <!-- 面板：追踪线 -->
    <section id="panel-timelines" class="panel" hidden>
      <div id="timeline-list" class="timeline-list"><div class="loading">正在加载…</div></div>
    </section>

    <!-- 面板：全部线索（全局搜索） -->
    <section id="panel-clues" class="panel" hidden>
      <div id="clue-results" class="clue-results"><div class="loading">正在加载…</div></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="disclaimer" id="disclaimer"></div>
  </footer>

  <script src="assets/disclaimer.js?v=20260701"></script>
  <script src="assets/index.js?v=20260701"></script>
</body>
</html>
