<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />

  <!-- 微信分享优化 -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="信息选题参考" />
  <meta property="og:title" content="信息选题参考 - 每日热点信息" />
  <meta property="og:description" content="每日热点信息，按日期归档。点击查看今日资讯。" />
  <meta property="og:image" content="https://dailyinfox.cn/assets/og-image.png" />
  <meta property="og:url" content="https://dailyinfox.cn" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="信息选题参考" />
  <meta name="twitter:description" content="每日热点信息，按日期归档" />
  <meta name="twitter:image" content="https://dailyinfox.cn/assets/og-image.png" />

  <title>信息选题参考</title>
  <meta name="description" content="每日热点信息，按日期归档" />
  <link rel="stylesheet" href="assets/style.css?v=20260702c" />
</head>
<body>
  <header class="site-header">
    <div class="sh-bar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <div class="brand-txt">
          <span class="brand-kicker">腾讯研究院</span>
          <span class="brand-name" id="site-title">信息选题参考</span>
        </div>
      </div>

      <nav class="tabbar" id="tabbar" aria-label="栏目">
        <button class="tab active" data-tab="issues">往期日报</button>
        <button class="tab" data-tab="timelines">追踪线</button>
        <button class="tab" data-tab="clues">全部线索</button>
      </nav>

      <div class="sh-tools">
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 10-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1114 9.5 4.5 4.5 0 019.5 14z"/></svg>
          <input id="search" type="search" placeholder="搜索标题、关键词、标签" autocomplete="off" />
        </div>
        <div class="sort-box" id="sort-box">
          <select id="sort">
            <option value="desc">最新在前</option>
            <option value="asc">最早在前</option>
          </select>
        </div>
      </div>
    </div>
    <p class="sh-tagline" id="site-subtitle">每日热点信息，按日期归档</p>
  </header>

  <main class="container">
    <div id="cat-filter" class="cat-filter" hidden></div>

    <section id="panel-issues" class="panel">
      <div id="issue-list" class="issue-list card-grid"><div class="loading">正在加载…</div></div>
    </section>

    <section id="panel-timelines" class="panel" hidden>
      <div id="timeline-list" class="timeline-list"><div class="loading">正在加载…</div></div>
    </section>

    <section id="panel-clues" class="panel" hidden>
      <div id="clue-results" class="clue-results card-grid"><div class="loading">正在加载…</div></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="disclaimer" id="disclaimer"></div>
  </footer>

  <script src="assets/disclaimer.js?v=20260702c"></script>
  <script src="assets/index.js?v=20260702c"></script>
</body>
</html>
